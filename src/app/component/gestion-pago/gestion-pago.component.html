<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="gestion-pago.js" type="text/javascript"></script>
    <title>Formulario de Expediente</title>
</head>
<body>
    <!-- FORMULARIO PARA PAGO -->
    <div>
        <img src="../../../assets/imagen/logo.png" alt="LexVargas Logo" class="d-inline-block align-text-top">
        <h1>Formulario de Expediente</h1>
    </div>
    
<div>    
    <form>
        <!-- Datos del expediente -->
        <label for="nombre-caso">Nombre del caso:</label>
        <input type="text" id="nombre-caso" name="nombre-caso" required>

        <label for="nombre-cliente">Nombre del cliente:</label>
        <input type="text" id="nombre-cliente" name="nombre-cliente" required>

        <label for="monto-total">Monto Total:</label>
        <input type="number" id="monto-total" name="monto-total" required>

        <!-- Tabla de pagos realizados -->
        <h2>Pagos Realizados</h2>
        <table>
            <thead>
                <tr>
                    <th>No. Pago</th>
                    <th>Fecha</th>
                    <th>Saldo Inicial</th>
                    <th>Pago</th>
                    <th>Saldo Final</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                </tr>
            </tbody>
        </table>

        <!-- Botones -->
        <div class="button-container">
            <button id="openModalBtn" type="button">Realizar Pago</button>
            <button type="button">Expediente Pagos</button>
        </div>
    </form>


<div class="modal" id="modalRealizarPago" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog"  role="document">
        <div class="modal-content">
            <div class="modal-body">
                <!-- <button type="button" class="close-btn" id="closeModalBtn">x</button>     -->
                <h3>Realizar pago</h3>
                <div>
                    <!-- Contenido del modal (inputs, opciones, etc.) -->
                </div>
                <div class="modal-buttons">
                    <button type="button">ACEPTAR</button>
                    <button type="button" id="btnCancelar">CANCELAR</button>
                </div>
            </div>
        </div>
    </div>
</div>
